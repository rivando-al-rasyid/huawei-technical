<!DOCTYPE html>
<html lang="id">
<head>
    <html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Form & Server Sederhana</title>
</head>
<body>

    <h2>Formulir Pendaftaran </h2>
    
    <form id="formPendaftaran">
        <div class="form-group">
            <label for="nama">Nama Lengkap:</label>
            <input type="text" id="nama" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit">Kirim Data</button>
        <button type="button" class="btn-fetch" id="btnMuatData">Muat Semua Data</button>
    </form>

    <!-- Area untuk Menampilkan Hasil -->
    <div class="box">
        <h3>Data Tercatat di Server:</h3>
        <div id="kontainerData">Belum ada data yang dimuat. Klik "Muat Semua Data" atau kirim form baru.</div>
    </div>

</body>
</html>

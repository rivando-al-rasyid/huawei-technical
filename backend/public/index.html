<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulasi Form & Server Sederhana</title>
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <h2>Formulir Pendaftaran</h2>

    <form class="formPendaftaran">
      <div class="form-group">
        <label>Nama Lengkap:</label>
        <input
          type="text"
          class="nama"
          placeholder="Nama"
          required
          minlength="3"
        />
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" class="email" placeholder="Email" required />
      </div>
      <div class="form-group">
        <label>Password:</label>
        <input
          type="password"
          class="password"
          placeholder="Password"
          required
          minlength="6"
        />
      </div>

      <button type="submit">Kirim Data</button>
      <button type="button" class="btn-fetch">Muat Semua Data</button>
    </form>

    <div class="box">
      <h3>Data Tercatat di Server:</h3>
      <div class="kontainerData">
        Belum ada data yang dimuat. Klik "Muat Semua Data" atau kirim form baru.
      </div>
    </div>
    <script src="page.js"></script>
  </body>
</html>
